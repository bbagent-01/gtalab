<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  .hero-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; text-align: center; color: #fff;
  }
  .hero-content h1 {
    font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 700;
    letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 1.5rem;
  }
  .hero-content p {
    font-size: clamp(1rem, 1.5vw, 1.25rem); color: rgba(255,255,255,0.6);
    max-width: 480px; line-height: 1.6;
  }

  /* ── Editor Panel ── */
  .editor-panel {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    background: rgba(10,10,10,0.88); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 0; min-width: 260px; max-height: calc(100vh - 32px); overflow-y: auto;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #aaa; font-size: 13px;
  }
  .editor-panel::-webkit-scrollbar { width: 4px; }
  .editor-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .section { border-bottom: 1px solid rgba(255,255,255,0.06); }
  .section:last-child { border-bottom: none; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; user-select: none;
    color: #ccc; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .section-header span:last-child { font-size: 10px; color: #555; transition: transform 0.2s; }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-header span:last-child { transform: rotate(-90deg); }
  .section-body { padding: 0 16px 12px; }

  .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .color-row label { flex: 1; font-size: 12px; color: #888; }
  .color-row input[type="color"] {
    width: 32px; height: 22px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; background: transparent; cursor: pointer; padding: 0;
  }
  .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
  .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { width: 90px; font-size: 11px; color: #888; flex-shrink: 0; }
  .slider-row input[type="range"] {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #ccc; cursor: pointer; border: none;
  }
  .slider-row .val { width: 32px; text-align: right; font-size: 10px; color: #666; font-variant-numeric: tabular-nums; }

  .editor-actions {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .editor-actions button {
    flex: 1; padding: 5px 0; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    color: #aaa; font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .editor-actions button:hover { background: rgba(255,255,255,0.15); color: #ddd; }

  /* ── Version Nav ── */
  .version-nav {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: flex; gap: 2px;
    background: rgba(10,10,10,0.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 3px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .version-nav a {
    padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.4); text-decoration: none; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .version-nav a:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }
  .version-nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<nav class="version-nav">
  <a href="index-v1.html">v1</a>
  <a href="index-v2.html">v2</a>
  <a href="index-v3.html" class="active">v3</a>
  <a href="index.html">v4</a>
</nav>

<div class="hero-content">
  <h1>Your shortcut to<br>everything.</h1>
  <p>A collection of powerful productivity tools all within an extendable launcher. Fast, ergonomic and reliable.</p>
</div>

<!-- Editor Panel -->
<div class="editor-panel">
  <!-- Colors Section -->
  <div class="section" id="colorsSection">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span>Colors</span><span>&#9660;</span>
    </div>
    <div class="section-body">
      <div class="color-row"><label>Highlight</label><input type="color" value="#EB1A1F" data-color="highlight"></div>
      <div class="color-row"><label>Accent</label><input type="color" value="#FA5230" data-color="accent"></div>
      <div class="color-row"><label>Mid</label><input type="color" value="#CC1A40" data-color="mid"></div>
      <div class="color-row"><label>Shadow</label><input type="color" value="#73080F" data-color="shadow"></div>
      <div class="color-row"><label>Background</label><input type="color" value="#050304" data-color="bg"></div>
    </div>
  </div>

  <!-- Controls Section -->
  <div class="section" id="controlsSection">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span>Controls</span><span>&#9660;</span>
    </div>
    <div class="section-body">
      <div class="slider-row"><label>Speed</label><input type="range" min="0.1" max="3" step="0.05" value="1" data-param="speed"><span class="val">1.0</span></div>
      <div class="slider-row"><label>Columns</label><input type="range" min="2" max="24" step="1" value="12" data-param="columns"><span class="val">12</span></div>
      <div class="slider-row"><label>Grain</label><input type="range" min="0" max="0.2" step="0.005" value="0.08" data-param="grain"><span class="val">0.08</span></div>
      <div class="slider-row"><label>Edge Bend</label><input type="range" min="0" max="3" step="0.1" value="1" data-param="edgeBend"><span class="val">1.0</span></div>
      <div class="slider-row"><label>Blob Size</label><input type="range" min="0.2" max="1.5" step="0.05" value="0.75" data-param="blobSize"><span class="val">0.75</span></div>
      <div class="slider-row"><label>Refraction</label><input type="range" min="0" max="2" step="0.05" value="1" data-param="refraction"><span class="val">1.0</span></div>
      <div class="slider-row"><label>Vignette</label><input type="range" min="0" max="1" step="0.05" value="0.5" data-param="vignette"><span class="val">0.50</span></div>
      <div class="slider-row"><label>Mouse Attract</label><input type="range" min="0" max="1" step="0.05" value="0.3" data-param="mouseAttract"><span class="val">0.30</span></div>
    </div>
  </div>

  <!-- Save/Load -->
  <div class="section">
    <div class="section-body" style="padding-top:12px">
      <div class="editor-actions">
        <button onclick="savePreset()">Save Preset</button>
        <button onclick="document.getElementById('presetUpload').click()">Load Preset</button>
      </div>
      <input type="file" id="presetUpload" accept=".json" style="display:none" onchange="loadPreset(event)">
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
const colors = {
  highlight: [0.92, 0.10, 0.12],
  accent:    [0.98, 0.32, 0.18],
  mid:       [0.80, 0.10, 0.25],
  shadow:    [0.45, 0.03, 0.06],
  bg:        [0.02, 0.015, 0.018],
};

const params = {
  speed: 1.0,
  columns: 12.0,
  grain: 0.08,
  edgeBend: 1.0,
  blobSize: 0.75,
  refraction: 1.0,
  vignette: 0.5,
  mouseAttract: 0.3,
};

function hexToGL(hex) {
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}
function glToHex(rgb) {
  return '#' + rgb.map(v => Math.round(Math.min(1,Math.max(0,v))*255).toString(16).padStart(2,'0')).join('');
}

// Wire color inputs
document.querySelectorAll('[data-color]').forEach(input => {
  input.addEventListener('input', e => { colors[e.target.dataset.color] = hexToGL(e.target.value); });
});

// Wire slider inputs
document.querySelectorAll('[data-param]').forEach(input => {
  const valSpan = input.nextElementSibling;
  input.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    params[e.target.dataset.param] = v;
    valSpan.textContent = v % 1 === 0 ? v : v.toFixed(2);
  });
});

// Save/Load presets (colors + params)
function savePreset() {
  const preset = {
    colors: {}, params: { ...params }
  };
  for (const k in colors) preset.colors[k] = glToHex(colors[k]);
  const blob = new Blob([JSON.stringify(preset, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'hero-preset.json'; a.click(); URL.revokeObjectURL(a.href);
}

function loadPreset(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const preset = JSON.parse(ev.target.result);
      if (preset.colors) {
        for (const k in preset.colors) {
          if (colors.hasOwnProperty(k)) {
            colors[k] = hexToGL(preset.colors[k]);
            const inp = document.querySelector(`[data-color="${k}"]`);
            if (inp) inp.value = preset.colors[k];
          }
        }
      }
      if (preset.params) {
        for (const k in preset.params) {
          if (params.hasOwnProperty(k)) {
            params[k] = preset.params[k];
            const inp = document.querySelector(`[data-param="${k}"]`);
            if (inp) {
              inp.value = params[k];
              inp.nextElementSibling.textContent = params[k] % 1 === 0 ? params[k] : params[k].toFixed(2);
            }
          }
        }
      }
    } catch (err) { console.error('Invalid preset', err); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── WebGL Setup ──────────────────────────────────────────────
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl', { alpha: false, antialias: false });

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── Shaders ──────────────────────────────────────────────────
const vertSrc = `
attribute vec2 a_position;
void main() { gl_Position = vec4(a_position, 0.0, 1.0); }`;

const fragSrc = `
precision highp float;

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;

// Colors
uniform vec3 u_highlight;
uniform vec3 u_accent;
uniform vec3 u_mid;
uniform vec3 u_shadow;
uniform vec3 u_bg;

// Controls
uniform float u_speed;
uniform float u_columns;
uniform float u_grain;
uniform float u_edgeBend;
uniform float u_blobSize;
uniform float u_refraction;
uniform float u_vignette;
uniform float u_mouseAttract;

// Simplex 2D noise
vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

vec3 sampleGradient(vec2 p, float t, vec2 mouse) {
  float spd = u_speed;
  float warp = snoise(p * 0.3 + t * 0.024 * spd + vec2(50.0, 30.0));

  float n1 = snoise(p * 0.5 + vec2(t * 0.06 * spd, t * 0.04 * spd) + mouse * 0.15) + warp * 0.2;
  float n2 = snoise(p * 0.4 + vec2(-t * 0.05 * spd, t * 0.07 * spd) + mouse * 0.1 + vec2(5.0, 3.0)) + warp * 0.15;
  float n3 = snoise(p * 0.6 + vec2(t * 0.036 * spd, -t * 0.056 * spd) - mouse * 0.12 + vec2(10.0, 7.0));

  float aspect = u_resolution.x / u_resolution.y;

  // Blob center — noise-driven position
  float rise = min(t * 0.04 * spd, 1.0);
  float baseY = mix(-0.7, 0.0, rise);

  vec2 noiseCenter = vec2(
    snoise(vec2(t * 0.04 * spd, 0.0) + mouse * 0.3) * aspect * 0.8,
    baseY + snoise(vec2(0.0, t * 0.05 * spd) + mouse * 0.2) * 0.35
  );

  // Attract blob toward mouse
  vec2 blobCenter = mix(noiseCenter, mouse, u_mouseAttract);

  float blobDist = length(p - blobCenter);
  float blobMask = smoothstep(u_blobSize, 0.08, blobDist);

  float m1 = smoothstep(-0.1, 0.5, n1) * blobMask;
  float m2 = smoothstep(-0.05, 0.55, n2) * blobMask;
  float m3 = smoothstep(0.0, 0.6, n3) * blobMask * 0.7;

  vec3 g = u_bg;
  g = mix(g, u_shadow,    blobMask * 0.5);
  g = mix(g, u_highlight, m1 * 0.8);
  g = mix(g, u_mid,       m2 * 0.7);
  g = mix(g, u_accent,    m3 * 0.5);

  float hotspot = smoothstep(0.35, 0.0, blobDist) * max(m1, m2);
  g += hotspot * vec3(0.3, 0.08, 0.03);

  return g;
}

float grain(vec2 p, float t) {
  return fract(sin(dot(p, vec2(12.9898, 78.233)) + t) * 43758.5453) * 2.0 - 1.0;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  float aspect = u_resolution.x / u_resolution.y;
  vec2 st = (uv - 0.5) * vec2(aspect, 1.0);
  vec2 mouse = (u_mouse - 0.5) * vec2(aspect, 1.0);
  float t = u_time;

  // Columns
  float COL_WIDTH = aspect / u_columns;
  float colPos = st.x + aspect * 0.5;
  float colIndex = floor(colPos / COL_WIDTH);
  float inCol = fract(colPos / COL_WIDTH);

  // Edge distortion
  float edgeDist = min(inCol, 1.0 - inCol);
  float edgeDistort = smoothstep(0.22, 0.0, edgeDist) * u_edgeBend;

  float edgeNoise = snoise(vec2(colIndex * 17.3, st.y * 2.0 + t * 0.04 * u_speed));
  float edgeNoise2 = snoise(vec2(colIndex * 31.7, st.y * 1.5 - t * 0.03 * u_speed + 5.0));
  vec2 edgeOffset = vec2(
    edgeDistort * (edgeNoise2 * 0.12 + 0.06),
    edgeDistort * edgeNoise * 0.30
  );

  // Per-column refraction
  float hash1 = fract(sin(colIndex * 127.1) * 43758.5453);
  float hash2 = fract(sin(colIndex * 269.5 + 37.0) * 18643.2891);
  vec2 refractOffset = vec2((hash1 - 0.5) * 0.4, (hash2 - 0.5) * 0.3) * u_refraction;

  vec2 samplePos = st + refractOffset + edgeOffset;
  vec3 color = sampleGradient(samplePos, t, mouse);

  // Mouse glow
  float mouseDist = length(st - mouse * 0.3);
  color += exp(-mouseDist * mouseDist * 3.0) * 0.05 * vec3(0.9, 0.2, 0.1);

  // Vignette
  float vig = 1.0 - smoothstep(0.15, 1.0, length(st * 0.85));
  color *= (1.0 - u_vignette) + u_vignette * vig;

  // Film grain
  float g = grain(gl_FragCoord.xy, t) * u_grain;
  color += g;

  color = pow(max(color, vec3(0.0)), vec3(0.94));
  gl_FragColor = vec4(color, 1.0);
}`;

// ── Compile & Link ───────────────────────────────────────────
function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    gl.deleteShader(shader); return null;
  }
  return shader;
}

const vert = createShader(gl.VERTEX_SHADER, vertSrc);
const frag = createShader(gl.FRAGMENT_SHADER, fragSrc);
const program = gl.createProgram();
gl.attachShader(program, vert);
gl.attachShader(program, frag);
gl.linkProgram(program);
gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const uniforms = {};
['u_resolution','u_time','u_mouse',
 'u_highlight','u_accent','u_mid','u_shadow','u_bg',
 'u_speed','u_columns','u_grain','u_edgeBend','u_blobSize','u_refraction','u_vignette','u_mouseAttract'
].forEach(name => { uniforms[name] = gl.getUniformLocation(program, name); });

// ── Mouse Tracking ───────────────────────────────────────────
let mouseX = 0.5, mouseY = 0.5, targetX = 0.5, targetY = 0.5;
document.addEventListener('mousemove', e => {
  targetX = e.clientX / window.innerWidth;
  targetY = 1.0 - e.clientY / window.innerHeight;
});

// ── Animation Loop ───────────────────────────────────────────
const startTime = performance.now();

function render() {
  mouseX += (targetX - mouseX) * 0.03;
  mouseY += (targetY - mouseY) * 0.03;
  const t = (performance.now() - startTime) * 0.001;

  gl.uniform2f(uniforms.u_resolution, canvas.width, canvas.height);
  gl.uniform1f(uniforms.u_time, t);
  gl.uniform2f(uniforms.u_mouse, mouseX, mouseY);

  // Colors
  gl.uniform3f(uniforms.u_highlight, ...colors.highlight);
  gl.uniform3f(uniforms.u_accent,    ...colors.accent);
  gl.uniform3f(uniforms.u_mid,       ...colors.mid);
  gl.uniform3f(uniforms.u_shadow,    ...colors.shadow);
  gl.uniform3f(uniforms.u_bg,        ...colors.bg);

  // Params
  gl.uniform1f(uniforms.u_speed,        params.speed);
  gl.uniform1f(uniforms.u_columns,      params.columns);
  gl.uniform1f(uniforms.u_grain,        params.grain);
  gl.uniform1f(uniforms.u_edgeBend,     params.edgeBend);
  gl.uniform1f(uniforms.u_blobSize,     params.blobSize);
  gl.uniform1f(uniforms.u_refraction,   params.refraction);
  gl.uniform1f(uniforms.u_vignette,     params.vignette);
  gl.uniform1f(uniforms.u_mouseAttract, params.mouseAttract);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
