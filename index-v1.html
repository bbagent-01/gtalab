<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  .hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    color: #fff;
  }
  .hero-content h1 {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }
  .hero-content p {
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    color: rgba(255,255,255,0.6);
    max-width: 480px;
    line-height: 1.6;
  }

  /* ── Version Nav ── */
  .version-nav {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    display: flex; gap: 2px;
    background: rgba(10,10,10,0.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 3px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .version-nav a {
    padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.4); text-decoration: none; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .version-nav a:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }
  .version-nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<nav class="version-nav">
  <a href="index-v1.html" class="active">v1</a>
  <a href="index-v2.html">v2</a>
  <a href="index-v3.html">v3</a>
  <a href="index.html">v4</a>
</nav>

<div class="hero-content">
  <h1>Your shortcut to<br>everything.</h1>
  <p>A collection of powerful productivity tools all within an extendable launcher. Fast, ergonomic and reliable.</p>
</div>

<script>
// ── WebGL Setup ──────────────────────────────────────────────
const canvas = document.getElementById('bg');
const gl = canvas.getContext('webgl', { alpha: false, antialias: false });

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── Shaders ──────────────────────────────────────────────────
const vertSrc = `
attribute vec2 a_position;
void main() {
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;

const fragSrc = `
precision highp float;

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;

//
// Simplex 2D noise (Ashima Arts)
//
vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                     -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

// Sample the flowing gradient at any position
// Concentrated bright blob on mostly dark background
vec3 sampleGradient(vec2 p, float t, vec2 mouse) {
  float warp = snoise(p * 0.3 + t * 0.012 + vec2(50.0, 30.0));

  float n1 = snoise(p * 0.5 + vec2(t * 0.03, t * 0.02) + mouse * 0.15) + warp * 0.2;
  float n2 = snoise(p * 0.4 + vec2(-t * 0.025, t * 0.035) + mouse * 0.1 + vec2(5.0, 3.0)) + warp * 0.15;
  float n3 = snoise(p * 0.6 + vec2(t * 0.018, -t * 0.028) - mouse * 0.12 + vec2(10.0, 7.0));

  // Concentrated blob: use a radial falloff centered on a drifting point
  vec2 blobCenter = vec2(
    snoise(vec2(t * 0.02, 0.0) + mouse * 0.3) * 0.4,
    snoise(vec2(0.0, t * 0.025) + mouse * 0.2) * 0.3
  );
  float blobDist = length(p - blobCenter);
  float blobMask = smoothstep(0.7, 0.1, blobDist); // tight falloff

  vec3 crimson = vec3(0.92, 0.10, 0.12);
  vec3 coral   = vec3(0.98, 0.32, 0.18);
  vec3 rose    = vec3(0.80, 0.10, 0.25);
  vec3 deep    = vec3(0.45, 0.03, 0.06);
  vec3 bg      = vec3(0.02, 0.015, 0.018);

  // Build gradient — concentrated by blobMask
  float m1 = smoothstep(-0.1, 0.5, n1) * blobMask;
  float m2 = smoothstep(-0.05, 0.55, n2) * blobMask;
  float m3 = smoothstep(0.0, 0.6, n3) * blobMask * 0.7;

  vec3 g = bg;
  g = mix(g, deep,    blobMask * 0.5);
  g = mix(g, crimson, m1 * 0.8);
  g = mix(g, rose,    m2 * 0.7);
  g = mix(g, coral,   m3 * 0.5);

  // Hot highlights in the blob center
  float hotspot = smoothstep(0.35, 0.0, blobDist) * max(m1, m2);
  g += hotspot * vec3(0.3, 0.08, 0.03);

  return g;
}

// Film grain
float grain(vec2 p, float t) {
  return fract(sin(dot(p, vec2(12.9898, 78.233)) + t) * 43758.5453) * 2.0 - 1.0;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  float aspect = u_resolution.x / u_resolution.y;
  vec2 st = (uv - 0.5) * vec2(aspect, 1.0);

  vec2 mouse = (u_mouse - 0.5) * vec2(aspect, 1.0);
  float t = u_time;

  // ═══════════════════════════════════════════════════════════
  // Vertical glass columns — perfectly vertical, uniform, wider
  // Invisible on their own — refract the gradient flowing beneath
  // ═══════════════════════════════════════════════════════════

  float COL_WIDTH = 0.22;  // wide columns

  // Which column are we in? (perfectly vertical = just use st.x)
  float colPos = st.x;
  float colIndex = floor(colPos / COL_WIDTH);

  // Position within this column (0 to 1)
  float inCol = fract(colPos / COL_WIDTH);

  // ── Edge distortion (glass bending at column boundaries) ──
  // Distance from nearest column edge (0 at edge, 0.5 at center)
  float edgeDist = min(inCol, 1.0 - inCol);

  // Distortion strength — strong at edges, zero at center
  float edgeDistort = smoothstep(0.15, 0.0, edgeDist);

  // Vertical smear/stretch at edges — bends the gradient
  float edgeNoise = snoise(vec2(colIndex * 17.3, st.y * 2.0 + t * 0.02));
  vec2 edgeOffset = vec2(0.0, edgeDistort * edgeNoise * 0.15);

  // ── Per-column refraction offset ──
  float hash1 = fract(sin(colIndex * 127.1) * 43758.5453);
  float hash2 = fract(sin(colIndex * 269.5 + 37.0) * 18643.2891);

  vec2 refractOffset = vec2(
    (hash1 - 0.5) * 0.4,
    (hash2 - 0.5) * 0.3
  );

  // Combine refraction + edge distortion
  vec2 samplePos = st + refractOffset + edgeOffset;
  vec3 color = sampleGradient(samplePos, t, mouse);

  // ── Edge highlight/darkening for glass feel ──
  // Darken slightly at the very edge for separation
  float edgeDarken = smoothstep(0.02, 0.0, edgeDist) * 0.3;
  color *= 1.0 - edgeDarken;

  // Subtle bright caustic line right at column edge
  float caustic = smoothstep(0.03, 0.01, edgeDist) * smoothstep(0.0, 0.005, edgeDist);
  float causticBrightness = length(color) * 0.4; // only visible where there's color
  color += caustic * causticBrightness * vec3(1.0, 0.7, 0.5);

  // ═══════════════════════════════════════════════════════════
  // Final touches
  // ═══════════════════════════════════════════════════════════

  // Mouse glow
  float mouseDist = length(st - mouse * 0.3);
  color += exp(-mouseDist * mouseDist * 3.0) * 0.05 * vec3(0.9, 0.2, 0.1);

  // Vignette — stronger to keep edges very dark
  float vig = 1.0 - smoothstep(0.15, 1.0, length(st * 0.85));
  color *= 0.5 + 0.5 * vig;

  // Film grain
  float g = grain(gl_FragCoord.xy, t) * 0.04;
  color += g;

  // Gamma
  color = pow(max(color, vec3(0.0)), vec3(0.94));

  gl_FragColor = vec4(color, 1.0);
}`;

// ── Compile & Link ───────────────────────────────────────────
function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
    gl.deleteShader(shader);
    return null;
  }
  return shader;
}

const vert = createShader(gl.VERTEX_SHADER, vertSrc);
const frag = createShader(gl.FRAGMENT_SHADER, fragSrc);
const program = gl.createProgram();
gl.attachShader(program, vert);
gl.attachShader(program, frag);
gl.linkProgram(program);
gl.useProgram(program);

// Full-screen quad
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const uRes = gl.getUniformLocation(program, 'u_resolution');
const uTime = gl.getUniformLocation(program, 'u_time');
const uMouse = gl.getUniformLocation(program, 'u_mouse');

// ── Mouse Tracking (with lerp smoothing) ─────────────────────
let mouseX = 0.5, mouseY = 0.5;
let targetX = 0.5, targetY = 0.5;

document.addEventListener('mousemove', (e) => {
  targetX = e.clientX / window.innerWidth;
  targetY = 1.0 - e.clientY / window.innerHeight; // flip Y for GL
});

// ── Animation Loop ───────────────────────────────────────────
const startTime = performance.now();

function render() {
  // Smooth lerp toward target mouse position
  mouseX += (targetX - mouseX) * 0.03;
  mouseY += (targetY - mouseY) * 0.03;

  const t = (performance.now() - startTime) * 0.001;

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouseX, mouseY);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
